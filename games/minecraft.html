<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>3D方块伍湖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;height:100dvh;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
#g{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.5);z-index:10;pointer-events:none}
#hud a{pointer-events:all;color:#fff;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:14px;font-size:12px;text-decoration:none}
#hud span{font-size:13px;font-weight:700;color:#fff}
#hud .m{font-size:11px;color:rgba(255,255,255,.7)}
#bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,.8);padding:6px 10px;border-radius:14px;z-index:10}
#bar div{width:44px;height:44px;border-radius:10px;border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;cursor:pointer;transition:all .15s}
#bar div.on{border-color:#ffd54f;box-shadow:0 0 12px rgba(255,213,79,.4);transform:translateY(-3px)}
#msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:10px;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20}
#msg.on{opacity:1}
#tip{position:absolute;bottom:66px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.45);pointer-events:none;z-index:5;text-align:center}
.cr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;pointer-events:none;z-index:5}
.cr::before,.cr::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
.cr::before{left:7px;top:0;width:2px;height:16px}
.cr::after{left:0;top:7px;width:16px;height:2px}

@media(max-width:768px){
.js{position:absolute;bottom:100px;left:16px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);z-index:10;display:flex;touch-action:none}
.js .k{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.3);left:50%;top:50%;transform:translate(-50%,-50%)}
.btns{position:absolute;bottom:100px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:10}
.btns button{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);color:#fff;font-size:22px;cursor:pointer}
}
@media(min-width:769px){.js,.btns{display:none}}
</style>
</head>
<body>
<div class="cr"></div>
<div id="hud"><a href="../index.html">Back</a><span>3D WuHu</span><span class="m" id="modeTxt">Build</span></div>
<div id="msg"></div>
<div class="js" id="js"><div class="k" id="jk"></div></div>
<div class="btns"><button id="bp">H</button><button id="bb">B</button></div>
<div id="tip">WASD move | Mouse look | L-click place | R-click break | Scroll/1-9 switch | Space fly</div>
<div id="bar"></div>
<canvas id="g"></canvas>

<script src="three.min.js"></script>
<script>
(function(){
if(typeof THREE==='undefined'){document.body.innerHTML='<div style="color:#fff;text-align:center;padding-top:40vh;font-size:20px">Three.js load failed<br><a href="../index.html" style="color:#7CB342">Back</a></div>';return}

var T=THREE;

// Scene
var scene=new T.Scene();scene.background=new T.Color(0x87CEEB);scene.fog=new T.Fog(0xB0D9B1,80,220);
var camera=new T.PerspectiveCamera(65,window.innerWidth/window.innerHeight,.5,300);
camera.position.set(64,50,64);camera.lookAt(64,25,64);
var renderer=new T.WebGLRenderer({canvas:document.getElementById('g'),antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;

// Lights
scene.add(new T.AmbientLight(0x8899aa,0.8));
var sun=new T.DirectionalLight(0xffeedd,5);sun.position.set(100,150,60);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-100;sun.shadow.camera.right=100;
sun.shadow.camera.top=100;sun.shadow.camera.bottom=-100;sun.shadow.camera.far=350;
scene.add(sun);
scene.add(new T.HemisphereLight(0x87CEEB,0x5a8a3c,0.6));

// Block types
var B={0:{n:'Air',c:0,s:false},1:{n:'Grass',c:0x7CB342,t:0x8BC34A,s:true},2:{n:'Dirt',c:0x8D6E63,s:true},
3:{n:'Water',c:0x42A5F5,t:0x64B5F6,s:false,a:0.55},4:{n:'Stone',c:0x9E9E9E,t:0xBDBDBD,s:true},
5:{n:'Wood',c:0x795548,t:0xA1887F,s:true},6:{n:'Leaf',c:0x388E3C,t:0x4CAF50,s:true},
7:{n:'Sand',c:0xFFE082,s:true},8:{n:'Brick',c:0xC62828,t:0xD32F2F,s:true},
9:{n:'Plank',c:0xFFB74D,t:0xFFCC80,s:true},10:{n:'Glass',c:0xB3E5FC,s:true,a:0.4}};

var HB=[1,2,4,5,6,7,8,9,10]; // Hotbar blocks
var sel=0,pl=true,md='build';

// World data
var WS=128,WH=52;
var w=[]; // w[y][x][z]
var group=new T.Group();scene.add(group);
var geo=new T.BoxGeometry(1,1,1);
var pool={};

function getM(bid){
  if(!pool[bid])pool[bid]=[];
  if(pool[bid].length){var m=pool[bid].pop();m.visible=true;return m}
  var b=B[bid],bc=new T.Color(b.c),tc=new T.Color(b.t||b.c),sc=new T.Color(b.s||b.c);
  var sd=[1,.9,.95,.8,.92,.88];
  var mats=[[],[]];
  for(var i=0;i<6;i++){
    var cl=(i===2?tc:(i===3?bc.clone().multiplyScalar(.75):sc.clone().multiplyScalar(sd[i])));
    mats[i]=new T.MeshStandardMaterial({color:cl,roughness:.9});
    if(b.a){mats[i].transparent=true;mats[i].opacity=b.a;mats[i].depthWrite=false}
  }
  var m=new T.Mesh(geo,mats);m.castShadow=true;m.receiveShadow=true;m.userData.bid=bid;return m
}
function rec(m){var bid=m.userData.bid;if(!pool[bid])pool[bid]=[];m.visible=false;pool[bid].push(m)}

// Height function
function hf(x,z){return Math.floor(24+Math.sin(x*.1+2)*4+Math.sin(z*.08+1)*5+Math.sin(x*.05+z*.05)*10+Math.sin(x*.18+z*.12)*3)}

// Generate
function gen(){
  for(var y=0;y<WH;y++){w[y]=[];for(var x=0;x<WS;x++){w[y][x]=[];for(var z=0;z<WS;z++)w[y][x][z]=0}}
  for(var x=0;x<WS;x++)for(var z=0;z<WS;z++){
    var h=hf(x,z);
    for(var y=0;y<WH;y++){if(y>h)w[y][x][z]=3;else if(y===h)w[y][x][z]=1;else if(y>h-4)w[y][x][z]=2;else w[y][x][z]=4}
  }
  // Trees
  var trees=[10,22,35,48,62,75,88,100,25,55,70,90];
  trees.forEach(function(x){var z=x+13,h=hf(x,z);if(h>10&&h<48){w[h-1][x][z]=2;for(var ty=2;ty<=5;ty++){if(h-ty>=0)w[h-ty][x][z]=5}for(var dx=-2;dx<=2;dx++)for(var dz=-2;dz<=2;dz++)for(var dy=-2;dy<=0;dy++){var lx=x+dx,lz=z+dz,ly=h-5+dy;if(lx>=0&&lx<WS&&lz>=0&&lz<WS&&ly>=0&&w[ly][lx][lz]===0)w[ly][lx][lz]=6}}});
  // Houses
  [58,78,38].forEach(function(cx){var cz=cx+3,h=hf(cx,cz);
    for(var dx=-4;dx<=4;dx++)for(var dz=-4;dz<=4;dz++)for(var dy=-1;dy<=5;dy++){var wx=cx+dx,wz=cz+dz,wy=h+dy;if(wx>=0&&wx<WS&&wz>=0&&wz<WS&&wy>=0&&wy<WH)w[wy][wx][wz]=2}
    for(var dx=-3;dx<=3;dx++)for(var dz=-3;dz<=3;dz++){if(h>=0)w[h][cx+dx][cz+dz]=9}
    for(var wy=1;wy<=4;wy++)for(var dx=-3;dx<=3;dx++)for(var dz=-3;dz<=3;dz++){var wx=cx+dx,wz=cz+dz,ty=h-wy;if(ty>=0){if(dx===-3||dx===3||dz===-3||dz===3)w[ty][wx][wz]=8;else w[ty][wx][wz]=5}}
    if(h-2>=0){w[h-2][cx-1][cz]=10;w[h-2][cx+1][cz]=10}
    if(h-1>=0)w[h-1][cx][cz]=10;
    var ry=h-5;if(ry>=0){for(var dx=-4;dx<=4;dx++)for(var dz=-4;dz<=4;dz++)w[ry][cx+dx][cz+dz]=8}
    if(ry-1>=0){for(var dx=-3;dx<=3;dx++)for(var dz=-3;dz<=3;dz++)w[ry-1][cx+dx][cz+dz]=8}
  });
  // Fields
  [[22,22],[48,48]].forEach(function(p){var cx=p[0],cz=p[1],h=hf(cx,cz);
    for(var dx=0;dx<6;dx++)for(var dz=0;dz<6;dz++)for(var y=h;y>=h-2;y--)w[y][cx+dx][cz+dz]=7;
    for(var dx=-1;dx<=6;dx++)for(var dz=-1;dz<=6;dz++)if(dx===-1||dx===6||dz===-1||dz===6)w[h+1][cx+dx][cz+dz]=8
  });
}

function build(){
  while(group.children.length)group.children.length=0;
  for(var x=0;x<WS;x++)for(var z=0;z<WS;z++)for(var y=0;y<WH;y++){
    var bid=w[y]&&w[y][x]&&w[y][x][z]||0;if(!bid)continue;
    var m=getM(bid);m.position.set(x,y,z);group.add(m)
  }
}

// Raycast
var raycaster=new T.Raycaster();raycaster.far=14;
var hl=new T.Mesh(new T.BoxGeometry(1.02,1.02,1.02),new T.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.2,depthTest:true}));
hl.visible=false;scene.add(hl);

function ray(){
  raycaster.setFromCamera(new T.Vector2(0,0),camera);
  var its=raycaster.intersectObjects(group.children);
  if(!its.length)return null;
  var p=its[0].point,n=its[0].face.normal.clone();n.transformDirection(its[0].object.matrixWorld);
  var hx=Math.floor(p.x+n.x*.1-.5*(n.x<0?1:0)),hy=Math.floor(p.y+n.y*.1-.5*(n.y<0?1:0)),hz=Math.floor(p.z+n.z*.1-.5*(n.z<0?1:0));
  var px=Math.floor(p.x+n.x*.5),py=Math.floor(p.y+n.y*.5),pz=Math.floor(p.z+n.z*.5);
  return {h:{x:hx,y:hy,z:hz,id:w[hy]&&w[hy][hx]&&w[hy][hx][hz]||-1},p:{x:px,y:py,z:pz}}
}

function upHL(){var t=ray();if(t&&t.h.id>0){hl.position.set(t.h.x+.5,t.h.y+.5,t.h.z+.5);hl.visible=true}else hl.visible=false}

// Actions
function brk(){
  var t=ray();if(!t||t.h.id<=0)return;
  var h=t.h,bid=w[h.y][h.x][h.z];w[h.y][h.x][h.z]=0;
  for(var i=group.children.length-1;i>=0;i--){var c=group.children[i];if(Math.abs(c.position.x-h.x)<.1&&Math.abs(c.position.y-h.y)<.1&&Math.abs(c.position.z-h.z)<.1){rec(c);group.remove(c);break}}
  msg(B[bid]?B[bid].n:'','broken')
}
function plc(){
  var t=ray();if(!t)return;
  var p=t.p,bid=w[p.y]&&w[p.y][p.x]&&w[p.y][p.x][p.z];
  if(bid===undefined||bid>0)return;
  w[p.y][p.x][p.z]=HB[sel];var m=getM(HB[sel]);m.position.set(p.x,p.y,p.z);group.add(m);
  msg(B[HB[sel]]?B[HB[sel]].n:'','placed')
}

var mt;function msg(n,a){if(mt)clearTimeout(mt);var s=document.getElementById('msg');s.textContent=(a==='broken'?'X ':'+ ')+a+' '+n;s.className='on';mt=setTimeout(function(){s.className=''},900)}

// Hotbar
function updBar(){
  var b=document.getElementById('bar');b.innerHTML='';
  HB.forEach(function(id,i){var d=document.createElement('div');d.textContent=B[id].n.charAt(0);d.className=i===sel?'on':'';d.onclick=function(){sel=i;updBar()};b.appendChild(d)})
}

// Input
var keys={};
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;if(e.key===' '){e.preventDefault();md=md==='build'?'fly':'build';document.getElementById('modeTxt').textContent=md==='build'?'Build':'Fly'}var n=parseInt(e.key);if(n>=1&&n<=9&&n<=HB.length){sel=n-1;updBar()}});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});

// Mouse look
var pitch=0,yaw=0,locked=false;
var cv=document.getElementById('g');
cv.addEventListener('click',function(){cv.requestPointerLock()});
document.addEventListener('pointerlockchange',function(){locked=document.pointerLockElement===cv});
document.addEventListener('mousemove',function(e){if(!locked)return;yaw-=e.movementX*.002;pitch-=e.movementY*.002;pitch=Math.max(-1.4,Math.min(1.4,pitch));camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch});
cv.addEventListener('wheel',function(e){e.preventDefault();sel=(sel+(e.deltaY>0?1:-1)+HB.length)%HB.length;updBar()});
cv.addEventListener('mousedown',function(e){if(!locked)return;if(e.button===0)pl?plc():brk();if(e.button===2)pl?brk():plc()});
cv.addEventListener('contextmenu',function(e){e.preventDefault()});

// Touch
var tl={a:false,lx:0,ly:0};
cv.addEventListener('touchstart',function(e){if(e.touches.length===1){tl.a=true;tl.lx=e.touches[0].clientX;tl.ly=e.touches[0].clientY}if(e.touches.length===3)document.exitPointerLock()},{passive:false});
cv.addEventListener('touchmove',function(e){if(!tl.a)return;e.preventDefault();var dx=e.touches[0].clientX-tl.lx,dy=e.touches[0].clientY-tl.ly;tl.lx=e.touches[0].clientX;tl.ly=e.touches[0].clientY;yaw-=dx*.003;pitch-=dy*.003;pitch=Math.max(-1.4,Math.min(1.4,pitch));camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch},{passive:false});
cv.addEventListener('touchend',function(){tl.a=false});

// Joystick (mobile)
var ms={fw:0,rt:0},joy=null;
var js=document.getElementById('js'),jk=document.getElementById('jk');
if(js){js.addEventListener('touchstart',function(e){e.preventDefault();joy={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:false});
js.addEventListener('touchmove',function(e){if(!joy)return;e.preventDefault();var dx=e.touches[0].clientX-joy.x,dy=e.touches[0].clientY-joy.y,d=Math.sqrt(dx*dx+dy*dy),mx=40;if(d>mx){dx=dx/d*mx;dy=dy/d*mx}jk.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';ms.fw=-dy/40;ms.rt=dx/40},{passive:false});
js.addEventListener('touchend',function(){joy=null;jk.style.transform='translate(-50%,-50%)';ms.fw=0;ms.rt=0},{passive:false})}
var bp=document.getElementById('bp'),bb=document.getElementById('bb');
if(bp){bp.addEventListener('touchstart',function(e){e.preventDefault();pl?plc():brk()})}
if(bb){bb.addEventListener('touchstart',function(e){e.preventDefault();pl?brk():plc()})}

// Game loop
var clock=new T.Clock();
function loop(){
  requestAnimationFrame(loop);
  var dt=Math.min(clock.getDelta(),.1),spd=md==='fly'?14:6;
  if(keys['shift'])spd*=2;
  var fw=0,rt=0;
  if(keys['w']||keys['arrowup'])fw++;if(keys['s']||keys['arrowdown'])fw--;
  if(keys['a']||keys['arrowleft'])rt--;if(keys['d']||keys['arrowright'])rt++;
  if(ms.fw)fw=ms.fw;if(ms.rt)rt=ms.rt;
  if(fw||rt){var dir=new T.Vector3(rt,0,-fw).applyQuaternion(camera.quaternion);dir.y=0;dir.normalize().multiplyScalar(spd*dt);camera.position.add(dir)}
  if(md==='fly'){if(keys['q'])camera.position.y-=spd*dt;if(keys['e'])camera.position.y+=spd*dt}else{
    camera.position.y-=9.8*dt;
    var gx=Math.floor(camera.position.x),gz=Math.floor(camera.position.z),gy=Math.floor(camera.position.y-1.62);
    var below=w[gy]&&w[gy][gx]&&w[gy][gx][gz]||0;
    if(below>0&&B[below]&&B[below].s)camera.position.y=gy+1.62;
    if(keys[' '])camera.position.y+=10*dt
  }
  camera.position.x=Math.max(.5,Math.min(WS-.5,camera.position.x));
  camera.position.y=Math.max(1,Math.min(WH-1,camera.position.y));
  camera.position.z=Math.max(.5,Math.min(WS-.5,camera.position.z));
  upHL();renderer.render(scene,camera)
}

// Start
var mob=/Android|iPhone|iPad/i.test(navigator.userAgent)||('ontouchstart' in window);
if(mob)document.getElementById('tip').textContent='Joystick move | H/B buttons | Hotbar switch blocks';
gen();build();updBar();
camera.position.set(64,hf(64,64)+10,64);camera.lookAt(64,hf(64,64),64);
loop();

})();
</script>
</body>
</html>
