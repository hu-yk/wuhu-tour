<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>方块伍湖 · 一码游伍湖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#1a1a2e;color:#fff;max-width:750px;margin:0 auto;
  overflow:hidden;user-select:none;-webkit-user-select:none;
  touch-action:none;height:100vh;display:flex;flex-direction:column
}
.top-hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;background:rgba(0,0,0,.7);z-index:10
}
.top-hud span{font-size:15px;font-weight:700}
.top-hud .back-btn{color:#fff;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:16px;font-size:13px;text-decoration:none}
.hotbar-row{display:flex;align-items:center;gap:4px;padding:8px;background:rgba(0,0,0,.8);overflow-x:auto;z-index:10}
.hotbar-row::-webkit-scrollbar{display:none}
.slot{
  flex-shrink:0;width:48px;height:48px;border-radius:8px;border:2px solid #555;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  cursor:pointer;transition:all .15s;position:relative
}
.slot.active{border-color:#ffd54f;box-shadow:0 0 12px rgba(255,213,79,.5);transform:translateY(-3px)}
.slot .count{position:absolute;bottom:1px;right:4px;font-size:10px;color:#fff;text-shadow:0 0 3px #000;font-weight:700}
.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.msg-toast{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:12px;
  font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s
}
.msg-toast.show{opacity:1}
.v-joystick{
  position:absolute;bottom:60px;left:20px;width:100px;height:100px;
  border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
  display:none
}
.v-joystick .knob{
  position:absolute;width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.35);left:50%;top:50%;transform:translate(-50%,-50%)
}
.action-btns{position:absolute;bottom:60px;right:20px;display:none;flex-direction:column;gap:10px}
.action-btns button{
  width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.25);color:#fff;font-size:20px;cursor:pointer
}
.action-btns button:active{background:rgba(255,255,255,.35)}
@media(max-width:768px){.v-joystick,.action-btns{display:flex}}
.help-bar{display:flex;justify-content:space-between;padding:4px 14px;background:rgba(0,0,0,.5);font-size:11px;color:#aaa}
</style>
</head>
<body>

<div class="top-hud">
  <a href="../index.html" class="back-btn">← 返回</a>
  <span id="mode-hint">🧱 建造模式</span>
  <span style="font-size:13px;opacity:.7" id="pos-display">0,0</span>
</div>

<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="game"></canvas>
  <div class="msg-toast" id="toast"></div>
  <div class="v-joystick" id="joystick"><div class="knob" id="knob"></div></div>
  <div class="action-btns">
    <button id="btn-place">🔨</button>
    <button id="btn-break">⛏</button>
  </div>
</div>

<div class="help-bar">
  <span id="help-text">WASD 移动 | 鼠标滚轮切换方块 | 左键破坏 | 右键放置 | 空格切换模式</span>
</div>

<div class="hotbar-row" id="hotbar"></div>

<script>
// ═══════════════════════════════════
//  方块伍湖 · Mini Minecraft
// ═══════════════════════════════════

var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
var wrap=document.getElementById('canvas-wrap'),toast=document.getElementById('toast');

// ── 方块定义 ──
var BLOCKS=[
  {id:0,name:'空气',color:'transparent',solid:false,emoji:''},
  {id:1,name:'草地',color:'#7CB342',solid:true,emoji:'🟩',top:'#8BC34A'},
  {id:2,name:'泥土',color:'#8D6E63',solid:true,emoji:'🟫'},
  {id:3,name:'水',color:'#42A5F5',solid:false,emoji:'🟦',top:'#64B5F6'},
  {id:4,name:'石头',color:'#9E9E9E',solid:true,emoji:'🪨',top:'#BDBDBD'},
  {id:5,name:'木头',color:'#A1887F',solid:true,emoji:'🟤',top:'#BCAAA4'},
  {id:6,name:'树叶',color:'#388E3C',solid:true,emoji:'🌿',top:'#4CAF50'},
  {id:7,name:'沙地',color:'#FFE082',solid:true,emoji:'🟨'},
  {id:8,name:'红砖',color:'#D32F2F',solid:true,emoji:'🧱',top:'#E53935'},
  {id:9,name:'木板',color:'#FFB74D',solid:true,emoji:'🪵',top:'#FFCC80'},
  {id:10,name:'玻璃',color:'#B3E5FC',solid:true,emoji:'🪟',top:'#E1F5FE',alpha:0.6}
];

// ── 世界参数 ──
var WORLD_W=80,WORLD_H=60,TILE=32;
var world=[]; // world[y][x] = blockId
var camera={x:0,y:0};
var player={x:40,y:30}; // 玩家所在格子
var hotbar=[1,2,4,5,6,8,9,10,3,7]; // 可选方块
var selected=0,mode='build'; // build | fly
var showGrid=true;
var keys={};
var particles=[];
var msgTimer=null;

// ── 生成世界 ──
function generateWorld(){
  for(var y=0;y<WORLD_H;y++){world[y]=[];for(var x=0;x<WORLD_W;x++){world[y][x]=0}}

  // 地形高度 (柏林噪声简化版)
  var heights=[];
  for(var x=0;x<WORLD_W;x++){
    var h=28+Math.sin(x*0.15)*5+Math.sin(x*0.08)*8+Math.sin(x*0.3)*3+Math.sin(x*0.04)*12;
    heights[x]=Math.floor(h);
  }

  // 填充地层
  for(var x=0;x<WORLD_W;x++){
    for(var y=0;y<WORLD_H;y++){
      if(y>heights[x]){world[y][x]=3} // 水
      else if(y===heights[x]){world[y][x]=1} // 草地
      else if(y>heights[x]-4){world[y][x]=2} // 泥土
      else{world[y][x]=4} // 石头
    }
  }

  // 树木
  for(var x=5;x<WORLD_W-5;x+=8+Math.floor(Math.random()*6)){
    var h=heights[x];if(h<10||h>50)continue;
    world[h-1][x]=2; // 树根
    for(var ty=2;ty<=5;ty++){if(h-ty>=0)world[h-ty][x]=5} // 树干
    var foliage=3+Math.floor(Math.random()*2);
    for(var fx=-foliage;fx<=foliage;fx++){
      for(var fy=-2;fy<=0;fy++){
        var lx=x+fx,ly=h-5+fy;
        if(lx>=0&&lx<WORLD_W&&ly>=0&&world[ly][lx]===0)world[ly][lx]=6
      }
    }
  }

  // 伍湖村建筑区
  buildVillage(35,heights[35]);
  buildVillage(55,heights[55]);

  // 稻田
  for(var rx=15;rx<=25;rx++){
    var rh=heights[rx];
    for(var ry=0;ry<3;ry++){if(rh-ry>=0)world[rh-ry][rx]=7}
    world[rh][rx]=8; // 田埂
  }
  for(var rx=45;rx<=52;rx++){
    var rh=heights[rx];
    for(var ry=0;ry<3;ry++){if(rh-ry>=0)world[rh-ry][rx]=7}
    world[rh][rx]=8;
  }

  // 玩家初始位置
  player.x=40;player.y=heights[40]-6;
}

function buildVillage(cx,gh){
  // 地面平整
  for(var dx=-3;dx<=3;dx++)for(var dy=-1;dy<=6;dy++){
    var wx=cx+dx,wy=gh+dy;if(wx>=0&&wx<WORLD_W&&wy>=0&&wy<WORLD_H)world[wy][wx]=2
  }
  for(var dx=-2;dx<=2;dx++){if(cx+dx>=0&&cx+dx<WORLD_W)world[gh][cx+dx]=9}

  // 墙壁
  for(var wy=1;wy<=4;wy++){
    for(var dx=-2;dx<=2;dx++){
      var wx=cx+dx,ty=gh-wy;
      if(wx>=0&&wx<WORLD_W&&ty>=0){
        if(dx===-2||dx===2)world[ty][wx]=8;else world[ty][wx]=5
      }
    }
  }
  // 窗户
  if(gh-2>=0){world[gh-2][cx-1]=10;world[gh-2][cx+1]=10}
  // 门
  if(gh-2>=0&&gh-1>=0){world[gh-2][cx]=10;world[gh-1][cx]=10}
  // 屋顶
  var ry=gh-5;
  for(var dx=-3;dx<=3;dx++){
    var wx=cx+dx;if(wx>=0&&wx<WORLD_W&&ry>=0)world[ry][wx]=8
  }
  if(ry-1>=0)for(var dx=-2;dx<=2;dx++){var wx=cx+dx;if(wx>=0&&wx<WORLD_W)world[ry-1][wx]=8}
}

// ── 渲染 ──
function render(){
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  var cols=Math.ceil(canvas.width/TILE)+2,rows=Math.ceil(canvas.height/TILE)+2;
  var startX=Math.floor(camera.x/TILE)-1,startY=Math.floor(camera.y/TILE)-1;

  // 天空渐变
  var skyGrad=ctx.createLinearGradient(0,0,0,canvas.height);
  skyGrad.addColorStop(0,'#87CEEB');skyGrad.addColorStop(.6,'#B0D9B1');skyGrad.addColorStop(1,'#5a8a3c');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,canvas.width,canvas.height);

  // 世界方块
  for(var y=0;y<rows;y++){
    for(var x=0;x<cols;x++){
      var wx=startX+x,wy=startY+y;
      if(wx<0||wx>=WORLD_W||wy<0||wy>=WORLD_H)continue;
      var bid=world[wy][wx];if(bid===0)continue;
      var b=BLOCKS[bid],sx=wx*TILE-camera.x,sy=wy*TILE-camera.y;

      // 方块本体
      if(bid===3){
        // 水：半透明动画
        var wave=Math.sin((wx+wy+Date.now()/800))*0.08;
        ctx.fillStyle='rgba(66,165,245,'+(0.7+wave)+')';
      }else if(b.alpha){
        ctx.fillStyle=b.color;ctx.globalAlpha=b.alpha;
      }else if(b.top){
        var side=0.15;
        // 主面
        ctx.fillStyle=b.top;ctx.fillRect(sx, sy, TILE, TILE);
        // 侧面阴影（3D感）
        ctx.fillStyle=b.color;
        ctx.fillRect(sx, sy+TILE-4, TILE, 4); // 底边
        ctx.fillRect(sx+TILE-4, sy, 4, TILE); // 右边
        ctx.globalAlpha=1;
        // 高光
        ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(sx, sy, TILE, TILE*.4);
        ctx.fillStyle='rgba(0,0,0,.1)';ctx.fillRect(sx, sy+TILE*.6, TILE, TILE*.4);
        drawBorder(sx,sy);continue;
      }else{
        ctx.fillStyle=b.color;
      }
      ctx.fillRect(sx, sy, TILE, TILE);
      if(b.alpha)ctx.globalAlpha=1;
      drawBorder(sx,sy);
    }
  }

  // 网格
  if(showGrid){
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.5;
    for(var y=0;y<rows;y++)for(var x=0;x<cols;x++){
      var sx=(startX+x)*TILE-camera.x,sy=(startY+y)*TILE-camera.y;
      ctx.strokeRect(sx,sy,TILE,TILE)
    }
  }

  // 玩家指示
  var px=player.x*TILE-camera.x+4,py=player.y*TILE-camera.y+4,ps=TILE-8;
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(px,py,ps,ps);
  ctx.fillStyle='#333';ctx.fillRect(px+4,py+4,ps-8,ps-8);
  // 眼睛
  ctx.fillStyle='#fff';ctx.fillRect(px+6,py+5,3,3);ctx.fillRect(px+12,py+5,3,3);
  ctx.fillStyle='#000';ctx.fillRect(px+7,py+6,2,2);ctx.fillRect(px+13,py+6,2,2);

  // 粒子
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=0.3;
    var sx=p.x-camera.x,sy=p.y-camera.y;
    ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+(p.life/p.maxLife)+')';
    ctx.fillRect(sx,sy,p.size,p.size);
    if(p.life<=0)particles.splice(i,1)
  }
}

function drawBorder(sx,sy){
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.5;ctx.strokeRect(sx,sy,TILE,TILE)
}

// ── 世界操作 ──
function getBlock(wx,wy){if(wx<0||wx>=WORLD_W||wy<0||wy>=WORLD_H)return-1;return world[wy][wx]}

function setBlock(wx,wy,bid){
  if(wx<0||wx>=WORLD_W||wy<0||wy>=WORLD_H)return;
  if(bid===0&&world[wy][wx]!==0){spawnParticles(wx*TILE,wy*TILE,BLOCKS[world[wy][wx]].color)}
  world[wy][wx]=bid
}

function spawnParticles(x,y,colorHex){
  var r=parseInt(colorHex.slice(1,3),16),g=parseInt(colorHex.slice(3,5),16),b=parseInt(colorHex.slice(5,7),16);
  for(var i=0;i<8;i++){particles.push({x:x+TILE/2,y:y+TILE/2,vx:(Math.random()-.5)*6,vy:-Math.random()*8-2,size:2+Math.random()*4,life:15+Math.random()*15,maxLife:30,r:r,g:g,b:b})}
}

function toastMsg(msg){if(msgTimer)clearTimeout(msgTimer);var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');msgTimer=setTimeout(function(){t.classList.remove('show')},1200)}

// ── 破坏方块 ──
function breakBlock(wx,wy){
  var bid=getBlock(wx,wy);if(bid<=0)return;
  setBlock(wx,wy,0);toastMsg(BLOCKS[bid].emoji+' '+BLOCKS[bid].name+' 破坏')
}

// ── 放置方块 ──
function placeBlock(wx,wy){
  var bid=getBlock(wx,wy);if(bid>0||bid===-1)return;
  var placeId=hotbar[selected];
  if(placeId===3&&getNeighborWater(wx,wy)<1)return; // 水只能邻水放
  setBlock(wx,wy,placeId);toastMsg(BLOCKS[placeId].emoji+' '+BLOCKS[placeId].name+' 放置')
}

function getNeighborWater(wx,wy){
  var n=0;if(getBlock(wx-1,wy)===3)n++;if(getBlock(wx+1,wy)===3)n++;if(getBlock(wx,wy-1)===3)n++;if(getBlock(wx,wy+1)===3)n++;return n
}

// ── 输入处理 ──
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;e.preventDefault()});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});

canvas.addEventListener('wheel',function(e){e.preventDefault();selected=(selected+(e.deltaY>0?1:-1)+hotbar.length)%hotbar.length;updateHotbar()});

canvas.addEventListener('click',function(e){
  var rect=canvas.getBoundingClientRect();
  var mx=(e.clientX-rect.left+camera.x),my=(e.clientY-rect.top+camera.y);
  var wx=Math.floor(mx/TILE),wy=Math.floor(my/TILE);
  if(e.button===0)breakBlock(wx,wy);else if(e.button===2)placeBlock(wx,wy)
});
canvas.addEventListener('contextmenu',function(e){e.preventDefault()});

// ── 移动端摇杆 ──
var joyMove=null;
(function(){
  var js=document.getElementById('joystick'),kn=document.getElementById('knob'),center={x:50,y:50};
  function jStart(e){e.preventDefault();joyMove={x:(e.touches[0].clientX),y:(e.touches[0].clientY)}}
  function jMove(e){
    if(!joyMove)return;e.preventDefault();
    var dx=(e.touches[0].clientX-joyMove.x),dy=(e.touches[0].clientY-joyMove.y);
    var dist=Math.sqrt(dx*dx+dy*dy),maxDist=40;
    if(dist>maxDist){dx=dx/dist*maxDist;dy=dy/dist*maxDist}
    kn.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    playerMove(dx/20,dy/20);
  }
  function jEnd(){joyMove=null;kn.style.transform='translate(-50%,-50%)';playerMove(0,0)}
  js.addEventListener('touchstart',jStart,{passive:false});
  js.addEventListener('touchmove',jMove,{passive:false});
  js.addEventListener('touchend',jEnd);
  document.getElementById('btn-place').addEventListener('touchstart',function(e){e.preventDefault();var wx=player.x,wy=player.y+1;placeBlock(wx,wy)});
  document.getElementById('btn-break').addEventListener('touchstart',function(e){e.preventDefault();var wx=player.x,wy=player.y+1;breakBlock(wx,wy)});
})();

// ── 移动逻辑 ──
var moveX=0,moveY=0;
function playerMove(dx,dy){moveX=dx;moveY=dy}

function updatePlayer(){
  if(moveX===0&&moveY===0){
    if(keys['w']||keys['arrowup']){player.y-=0.15;moveY=-1}
    if(keys['s']||keys['arrowdown']){player.y+=0.15;moveY=1}
    if(keys['a']||keys['arrowleft']){player.x-=0.15;moveX=-1}
    if(keys['d']||keys['arrowright']){player.x+=0.15;moveX=1}
  }else{
    var speed=mode==='fly'?0.3:0.12;
    player.x+=moveX*speed;player.y+=moveY*speed;
  }

  // 重力（建造模式）
  if(mode==='build'){
    var below=getBlock(player.x,Math.floor(player.y+1+0.1));
    if(!BLOCKS[below]||!BLOCKS[below].solid){
      player.y+=0.18;
      if(player.y>WORLD_H-3)player.y=WORLD_H-3;
    }
  }

  // 水中
  if(getBlock(Math.floor(player.x),Math.floor(player.y))===3){
    if(mode==='build')player.y-=0.05;
  }

  // 边界
  player.x=Math.max(0,Math.min(WORLD_W-1,player.x));
  player.y=Math.max(0,Math.min(WORLD_H-2,player.y));

  // 相机跟随
  camera.x=player.x*TILE-canvas.width/2;
  camera.y=player.y*TILE-canvas.height/2;

  document.getElementById('pos-display').textContent=Math.floor(player.x)+','+Math.floor(player.y);
}

// ── 按空格切换模式 ──
document.addEventListener('keydown',function(e){
  if(e.key===' '){e.preventDefault();mode=mode==='build'?'fly':'build';document.getElementById('mode-hint').textContent=mode==='build'?'🧱 建造模式':'🕊 飞行模式'}
});

// ── 热键栏 ──
function updateHotbar(){
  var hb=document.getElementById('hotbar');hb.innerHTML='';
  hotbar.forEach(function(bid,i){
    var b=BLOCKS[bid];
    var s=document.createElement('div');s.className='slot'+(i===selected?' active':'');
    s.textContent=b.emoji||'?';s.title=b.name;
    s.onclick=function(){selected=i;updateHotbar()};
    hb.appendChild(s)
  })
}
updateHotbar();

// 数字键切换
document.addEventListener('keydown',function(e){
  var n=parseInt(e.key);if(n>=1&&n<=9&&n<=hotbar.length){selected=n-1;updateHotbar()}
});

// ── 游戏循环 ──
generateWorld();
updateHotbar();

var helpText=document.getElementById('help-text');
var isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent)||('ontouchstart' in window);
if(isMobile){helpText.textContent='摇杆移动 | 🔨 放置 | ⛏ 破坏 | 上方热键栏切换方块';document.querySelector('.action-btns').style.display='flex';document.querySelector('.v-joystick').style.display='block'}

function gameLoop(){
  updatePlayer();
  render();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// 窗口调整
window.addEventListener('resize',render);
</script>
</body>
</html>
