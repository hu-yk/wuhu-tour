<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>伍湖知识问答 · 一码游伍湖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f9f5f1,#e8d9c5);min-height:100vh;max-width:750px;margin:0 auto;display:flex;flex-direction:column}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
.back-btn{color:#2d8659;padding:6px 14px;border-radius:20px;font-size:14px;text-decoration:none;font-weight:600;background:#fff}
.progress-bar{height:8px;background:#e8d9c5;margin:0 18px;border-radius:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,#2d8659,#4A6F5D);transition:width .4s ease;border-radius:10px}
.quiz-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 18px}
.question-card{background:#fff;border-radius:20px;padding:32px 24px;box-shadow:0 8px 24px rgba(0,0,0,.08);border:1px solid #e8d9c5}
.question-num{font-size:13px;color:#8b5a2b;margin-bottom:12px;font-weight:600}
.question-text{font-size:20px;font-weight:700;color:#1e2a1c;line-height:1.5;margin-bottom:24px}
.options{display:flex;flex-direction:column;gap:10px}
.option{
  padding:16px 18px;border-radius:14px;border:2px solid #e8d9c5;background:#faf7f2;
  cursor:pointer;font-size:16px;color:var(--ink,#333);transition:all .2s;text-align:left;font-family:inherit
}
.option:active{transform:scale(.98)}
.option.correct{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:700}
.option.wrong{background:#ffebee;border-color:#f44336;color:#c62828}
.option:disabled{opacity:.7;pointer-events:none}
.feedback{text-align:center;padding:16px 0;font-size:15px;font-weight:600;min-height:50px}
.next-btn{background:linear-gradient(135deg,#2d8659,#4A6F5D);color:#fff;border:none;padding:14px 0;border-radius:30px;font-size:17px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 16px rgba(45,134,89,.25);margin-top:12px;display:none}
.next-btn:active{transform:scale(.97)}
.over-card{background:#fff;border-radius:20px;padding:40px 28px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.08);margin:0 18px}
.over-card h2{font-size:28px;color:#2d8659;margin-bottom:8px}
.over-card .big-score{font-size:56px;font-weight:900;color:#e65100;margin:12px 0}
.over-card .stats{color:#666;font-size:14px;margin-bottom:20px}
.over-card button{background:linear-gradient(135deg,#2d8659,#4A6F5D);color:#fff;border:none;padding:14px 48px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(45,134,89,.25);margin:4px}
.over-card button:active{transform:scale(.95)}
</style>
</head>
<body>

<div class="top-bar"><a href="../index.html" class="back-btn">← 返回</a><span style="font-weight:700;color:#2d8659">🧠 伍湖知多少</span><span style="color:#666;font-size:14px" id="counter">1/8</span></div>
<div class="progress-bar"><div class="fill" id="progress" style="width:0%"></div></div>

<div id="quiz-area" class="quiz-area"></div>

<script>
var questions=[
  {q:'伍湖村位于哪个县？',o:['云梦县','孝昌县','安陆市','大悟县'],a:0,exp:'伍湖村位于湖北省孝感市云梦县沙河乡'},
  {q:'稻虾共作模式的核心优势是？',o:['只用一种水','一水两用、一田双收','需要分开两块田','只能用化学肥料'],a:1,exp:'稻虾共作实现"一水两用、一田双收、粮渔共赢"'},
  {q:'2024年11月习近平总书记考察了云梦哪个场馆？',o:['云梦图书馆','云梦体育馆','云梦县博物馆','云梦科技馆'],a:2,exp:'2024年11月习近平总书记考察云梦县博物馆，了解文物保护研究利用'},
  {q:'2026年是红军长征胜利多少周年？',o:['80周年','85周年','90周年','100周年'],a:2,exp:'2026年是中国工农红军长征胜利90周年'},
  {q:'伍湖村龚华铭烈士纪念广场属于什么类型的文化资源？',o:['传统文化','红色文化','商业文化','民俗文化'],a:1,exp:'龚华铭烈士纪念广场是伍湖村红色文化资源的重要组成部分'},
  {q:'"双水双绿"指的是什么？',o:['两个水库','绿色水稻+绿色水产协同发展','两种颜色的水','两个水龙头'],a:1,exp:'"双水双绿"指绿色水稻和绿色水产协同发展的生态农业技术体系'},
  {q:'伍湖四海生态园主要提供什么体验？',o:['工厂参观','城市观光','生态农业+观光旅游','商场购物'],a:2,exp:'伍湖四海生态园是集生态农业、观光旅游、休闲体验于一体的农旅项目'},
  {q:'本项目的实践主题是什么？',o:['循城市发展','循迹悟思想·数智兴农旅','探企业文化','访都市商圈'],a:1,exp:'项目主题为"循迹悟思想、数智兴农旅"，走好新时代长征路'}
];

var idx=0,score=0,answered=false,correctCount=0;
var area=document.getElementById('quiz-area'),counter=document.getElementById('counter'),progress=document.getElementById('progress');

function renderQuestion(){
  answered=false;counter.textContent=(idx+1)+'/'+questions.length;progress.style.width=((idx/questions.length)*100)+'%';
  var q=questions[idx];
  var html='<div class="question-card"><div class="question-num">第'+(idx+1)+'题</div><div class="question-text">'+q.q+'</div><div class="options">';
  q.o.forEach(function(o,i){html+='<button class="option" onclick="answer('+i+',this)">'+o+'</button>'});
  html+='</div></div><div class="feedback" id="feedback"></div><button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题 →</button>';
  area.innerHTML=html;
}

function answer(i,btn){
  if(answered)return;answered=true;
  var q=questions[idx],allBtns=document.querySelectorAll('.option');allBtns.forEach(function(b){b.disabled=true});
  if(i===q.a){btn.classList.add('correct');score+=10;correctCount++;document.getElementById('feedback').innerHTML='✅ 正确！+10分';document.getElementById('feedback').style.color='#2e7d32'}else{btn.classList.add('wrong');allBtns[q.a].classList.add('correct');document.getElementById('feedback').innerHTML='❌ 正确答案是：'+q.o[q.a]+'<br><small>'+q.exp+'</small>';document.getElementById('feedback').style.color='#c62828'}
  var nb=document.getElementById('next-btn');nb.style.display='block';nb.textContent=idx<questions.length-1?'下一题 →':'查看成绩 🏆';
}

function nextQuestion(){
  if(idx<questions.length-1){idx++;renderQuestion()}else{showResult()}
}

function showResult(){
  progress.style.width='100%';
  var grade=correctCount>=6?'🌾 伍湖通！满分水准！':correctCount>=4?'👍 了解不少，继续加油！':'🌱 来村里实地走一圈就都知道了~';
  area.innerHTML='<div class="over-card"><h2>🧠 答题完成！</h2><div class="big-score">'+score+'分</div><div class="stats">答对 '+correctCount+'/'+questions.length+' 题<br>'+grade+'</div><button onclick="restart()">再来一次</button><button style="background:#fff;color:#2d8659;border:2px solid #2d8659" onclick="location.href=\'../index.html\'">返回首页</button></div>';
  counter.textContent='完成';
}

function restart(){idx=0;score=0;answered=false;correctCount=0;progress.style.width='0%';renderQuestion()}
renderQuestion();
</script>
</body>
</html>
