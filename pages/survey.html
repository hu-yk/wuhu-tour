<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>游客反馈 · 一码游伍湖</title><link rel="stylesheet" href="../assets/css/style.css"/></head><body>
<div class="back-bar"><a href="../index.html">← 返回首页</a></div>
<div class="hero h-orange"><div class="h-t">游客反馈</div><div class="h-s">告诉我们你的游玩体验</div><div class="h-chip">帮助伍湖变得更好</div></div>

<div class="notice">你的每条反馈都会被认真对待。不收集手机号、微信等个人信息。</div>

<form id="survey-form">
  <div class="form-g"><label>你从哪来？ *</label><select class="form-s" name="city"><option value="">请选择</option><option>伍湖村本地</option><option>云梦县城</option><option>孝感市区</option><option>省内其他城市</option><option>省外</option></select></div>
  <div class="form-g"><label>怎么知道伍湖的？</label><div class="chk-row"><label class="chk-chip"><input type="checkbox" name="ch" value="朋友推荐">朋友推荐</label><label class="chk-chip"><input type="checkbox" name="ch" value="抖音">抖音</label><label class="chk-chip"><input type="checkbox" name="ch" value="微信">微信</label><label class="chk-chip"><input type="checkbox" name="ch" value="小红书">小红书</label><label class="chk-chip"><input type="checkbox" name="ch" value="路过">路过</label></div></div>
  <div class="form-g"><label>和谁一起来的？</label><select class="form-s" name="companion"><option value="">请选择</option><option>一个人</option><option>亲子家庭</option><option>朋友结伴</option><option>单位/团建</option></select></div>
  <div class="form-g"><label>对什么最感兴趣？</label><select class="form-s" name="interest"><option value="">请选择</option><option>稻虾基地</option><option>博物馆秦简</option><option>生态园游玩</option><option>买虾稻米</option><option>亲子游乐园</option><option>美食农家菜</option></select></div>
  <div class="form-g"><label>想买伍湖特产吗？</label><select class="form-s" name="willing"><option value="">请选择</option><option>想买</option><option>看价格</option><option>先看看</option></select></div>
  <div class="form-g"><label>有什么建议？</label><textarea class="form-t" name="suggestion" placeholder="比如：路标不清楚、想增加什么项目、哪里需要改进……"></textarea></div>
  <button type="submit" class="btn btn-p mt">提交反馈</button>
</form>
<button class="btn btn-s mt" onclick="goStats()" style="margin-bottom:24px">查看游客画像 →</button>

<style>
.chk-row{display:flex;flex-wrap:wrap;gap:6px}
.chk-chip{padding:6px 12px;border-radius:16px;border:1px solid #d9c7b8;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;background:#fff}
</style>
<script>
var form=document.getElementById('survey-form');
form.addEventListener('submit',function(e){e.preventDefault();var fd=new FormData(form),data={};fd.forEach(function(v,k){data[k]=v});if(!data.city){alert('请填"你从哪来"');return}var chs=[];form.querySelectorAll('input[name=ch]:checked').forEach(function(c){chs.push(c.value)});data.channel=chs.join('、');var list=JSON.parse(localStorage.getItem('surveyList')||'[]');list.push({city:data.city,channel:data.channel,companion:data.companion,interest:data.interest,willing:data.willing,suggestion:data.suggestion,time:new Date().toISOString()});localStorage.setItem('surveyList',JSON.stringify(list));alert('感谢你的反馈！');form.reset()});
function goStats(){window.location.href='stats.html'}
</script>
</body></html>
