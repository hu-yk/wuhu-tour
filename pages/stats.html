<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>游客画像 · 一码游伍湖</title><link rel="stylesheet" href="../assets/css/style.css"/></head><body>
<div class="back-bar"><a href="survey.html">← 返回反馈</a></div>
<div class="hero h-orange"><div class="h-t">游客画像</div><div class="h-s">来看看大家怎么玩伍湖</div></div>
<div class="kpi-row"><div class="kpi"><span class="kpi-n" id="kpi-total">0</span><span class="kpi-l">反馈总数</span></div></div>
<div class="info-block"><h2>从哪里来</h2><div id="stat-city"></div></div>
<div class="info-block"><h2>和谁来</h2><div id="stat-companion"></div></div>
<div class="info-block"><h2>感兴趣什么</h2><div id="stat-interest"></div></div>
<div class="notice">数据仅保存于本机</div>
<button class="btn btn-s mt" onclick="clearAll()" style="margin-bottom:24px">清空数据</button>
<script>
function loadAll(){var list=JSON.parse(localStorage.getItem('surveyList')||'[]');document.getElementById('kpi-total').textContent=list.length;['city','companion','interest','willing'].forEach(function(f){var g={};list.forEach(function(r){var v=r[f];if(v){g[v]=(g[v]||0)+1}});var el=document.getElementById('stat-'+f);if(!el)return;el.innerHTML='';if(Object.keys(g).length===0){el.innerHTML='<p class="text-sm text-muted">暂无数据</p>';return}Object.keys(g).sort(function(a,b){return g[b]-g[a]}).forEach(function(k){el.innerHTML+='<div class="field-line"><span class="fl-k">'+k+'</span><span class="fl-v">'+g[k]+' 条</span></div>'})})}
function clearAll(){if(confirm('确定清空？')){localStorage.removeItem('surveyList');loadAll()}}
loadAll();
</script>
</body></html>
