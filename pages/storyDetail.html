<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>故事详情 · 一码游伍湖</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
<div class="back-bar"><a href="../index.html#culture">← 返回循迹</a></div>
<div class="hero h-green"><div class="h-t" id="detail-title">加载中…</div><div class="h-s" id="detail-type"></div></div>

<div class="info-block"><h2>故事内容</h2><p id="detail-content" style="white-space:pre-wrap">加载中…</p></div>
<div class="info-block"><h2>实践行动</h2><p id="detail-action"></p></div>
<div class="notice" id="detail-source" style="display:none"></div>

<div id="imgs-area"></div>
<div id="video-area"></div>

<script src="../assets/js/data.js"></script>
<script>
(function(){
  var id=new URL(window.location.href).searchParams.get('id');
  var story=(STORIES||[]).find(function(s){return s.id===id})||(STORIES[0]);
  document.getElementById('detail-title').textContent=story.title;
  document.getElementById('detail-type').textContent=story.type;
  document.getElementById('detail-content').textContent=story.content;
  document.getElementById('detail-action').textContent=story.action;
  if(story.source){var el=document.getElementById('detail-source');el.textContent='来源：'+(story.source||'');el.style.display=''}
  document.title=story.title+' · 一码游伍湖';

  // 照片
  if(story.imgs && story.imgs.length){
    var div=document.getElementById('imgs-area');
    div.innerHTML='<div class="sec-hd"><span class="sec-title">📸 现场照片</span></div><div class="photo-strip">'+story.imgs.map(function(src){return '<div class="ps-item"><img src="../'+src+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/><span class="ps-label">'+src.split('/').pop().replace('.jpg','').replace('.mp4','')+'</span></div>'}).join('')+'</div>'
  }

  // 视频
  if(story.video){
    var vd=document.getElementById('video-area');
    var vlabel=story.videoLabel||story.video.split('/').pop().replace('.mp4','');
    vd.innerHTML='<div class="sec-hd"><span class="sec-title">🎬 '+vlabel+'</span></div><div class="info-block" style="padding:0;overflow:hidden"><video src="../'+story.video+'" controls preload="none" playsinline style="width:100%;display:block;border-radius:12px"></video></div>'
  }
})();
</script>
</body>
</html>
