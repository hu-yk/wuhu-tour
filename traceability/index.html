<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta property="og:title" content="产品溯源" />
  <meta property="og:description" content="扫一扫，查看农产品从田间到餐桌的完整溯源信息" />
  <title>产品溯源 · 伍湖农文旅</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="trace.css" />
</head>
<body>

  <!-- 顶部 -->
  <header class="top-bar trace-top">
    <a href="../index.html" class="back-btn">← 返回</a>
    <h1 id="product-name">产品溯源</h1>
  </header>

  <main id="trace-content">

    <!-- 轮播图区域 -->
    <div class="image-swiper" id="image-swiper">
      <div class="swiper-track" id="swiper-track"></div>
      <div class="swiper-dots" id="swiper-dots"></div>
    </div>

    <!-- 产品基本信息 -->
    <div class="info-block">
      <h2>产地信息</h2>
      <div class="kv-list">
        <div class="kv-row"><span class="kv-key">产地</span><span class="kv-val" id="field-origin">——</span></div>
        <div class="kv-row"><span class="kv-key">坐标</span><span class="kv-val" id="field-gps">——</span></div>
        <div class="kv-row"><span class="kv-key">认证</span><span class="kv-val" id="field-cert">——</span></div>
      </div>
    </div>

    <!-- 地图 -->
    <div class="info-block">
      <h2>产地位置</h2>
      <div class="map-container" id="map-container">
        <div class="map-fallback" id="map-fallback">
          <p>📍 湖北省孝感市云梦县沙河乡伍湖村</p>
          <p class="map-hint">（联网后加载在线地图）</p>
        </div>
      </div>
    </div>

    <!-- 生产者 -->
    <div class="info-block">
      <h2>生产主体</h2>
      <div class="producer-card">
        <img src="" alt="生产者" id="producer-avatar" class="producer-avatar" />
        <div class="producer-text">
          <h3 id="producer-name">——</h3>
          <p id="producer-intro">——</p>
        </div>
      </div>
    </div>

    <!-- 种养方式 -->
    <div class="info-block">
      <h2>生态种养方式</h2>
      <p id="field-method">——</p>
    </div>

    <!-- 产品故事 -->
    <div class="info-block">
      <h2>产品故事</h2>
      <p id="field-story">——</p>
    </div>

    <!-- 购买 -->
    <div class="info-block" id="buy-section" style="display:none;">
      <h2>购买渠道</h2>
      <a id="buy-link" href="#" target="_blank" class="buy-button">立即购买 →</a>
    </div>

    <!-- 溯源二维码 -->
    <div class="info-block">
      <h2>溯源二维码</h2>
      <p class="qrcode-hint">扫描二维码，查看本页溯源信息</p>
      <div id="qrcode-container" class="qrcode-box"></div>
    </div>

  </main>

  <script src="../assets/js/qrcode.min.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/map.js"></script>
  <script src="trace.js"></script>
</body>
</html>
